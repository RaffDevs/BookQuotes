server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        application/javascript
        application/json
        application/wasm
        image/svg+xml
        text/css
        text/plain;

    location = /index.html {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location = /service-worker.js {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location = /service-worker-assets.js {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location /_framework/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
