<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookQuotes</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="BookQuotes.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="_content/Cropper.Blazor/cropper.min.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="app-splash">
            <div class="app-splash__orb app-splash__orb--one"></div>
            <div class="app-splash__orb app-splash__orb--two"></div>
            <div class="app-splash__card">
                <div class="app-splash__badge">PWA</div>
                <div class="app-splash__icon-shell">
                    <div class="app-splash__icon">
                        <span class="app-splash__icon-book"></span>
                    </div>
                </div>
                <div class="app-splash__brand">BookQuotes</div>
                <div class="app-splash__tagline">Capture trechos, organize ideias e revisite seus livros favoritos.</div>
                <div class="app-splash__progress">
                    <div class="app-splash__progress-bar"></div>
                </div>
                <div class="app-splash__status">Carregando sua biblioteca...</div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="_content/Cropper.Blazor/cropper.min.js"></script>
    <script src="js/localStorage.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/ocr.js"></script>
    <script src="js/pwaInstall.js"></script>

</body>

</html>
